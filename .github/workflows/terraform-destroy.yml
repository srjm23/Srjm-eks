name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Digite DESTROY para confirmar a destruição da infraestrutura"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-production
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_VAR_eks_public_access_cidr: ${{ secrets.EKS_PUBLIC_ACCESS_CIDR }}

jobs:
  terraform-destroy:
    name: Terraform Destroy Manual
    if: github.ref == 'refs/heads/main' && inputs.confirmation == 'DESTROY'
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar credenciais AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Instalar Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.8.5

      - name: Inicializar Terraform com backend S3
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ vars.TF_STATE_KEY }}" \
            -backend-config="region=${{ vars.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ vars.TF_LOCK_TABLE }}" \
            -backend-config="encrypt=true"

      - name: Validar Terraform
        run: terraform validate

      - name: Gerar plano de destruição
        run: terraform plan -destroy -input=false -out=destroy.tfplan

      - name: Exibir plano de destruição
        run: terraform show -no-color destroy.tfplan

      - name: Destruir infraestrutura
        run: terraform apply -input=false -auto-approve destroy.tfplan
