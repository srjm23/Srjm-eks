apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2

  role: KarpenterNodeRole

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "true"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "true"

  tags:
    Name: karpenter-node
    karpenter.sh/discovery: "true"